<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>

    <!-- Left→right: blue to green -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="28" fill="url(#bg)"/>
  <rect width="200" height="200" rx="28" fill="none" stroke="#1e3a8a" stroke-width="1" opacity="0.6"/>

  <!-- Fan: one source → three destinations -->
  <!-- Mirrors FxMap's core: UserId → UserName, UserEmail, UserRole -->
  <path d="M 48,100 C 90,100 110,52  158,52"  stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.9"/>
  <path d="M 48,100 C 90,100 110,100 158,100" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.7"/>
  <path d="M 48,100 C 90,100 110,148 158,148" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.5"/>

  <!-- Source dot (blue) -->
  <circle cx="48" cy="100" r="8" fill="#2563eb" filter="url(#dot-glow)"/>

  <!-- Destination dots (green, slightly smaller and fading) -->
  <circle cx="158" cy="52"  r="6.5" fill="#22c55e" filter="url(#dot-glow)" opacity="0.95"/>
  <circle cx="158" cy="100" r="6.5" fill="#22c55e" filter="url(#dot-glow)" opacity="0.75"/>
  <circle cx="158" cy="148" r="6.5" fill="#22c55e" filter="url(#dot-glow)" opacity="0.55"/>
</svg>
