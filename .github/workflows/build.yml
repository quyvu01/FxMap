# This workflow will build and publish all FxMap ecosystem packages when the version changes.

name: Build FxMap and Publish
env:
  VERSION: 1.0.2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: 'build fxmap project'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
  
  testing:
    needs: build
    name: "Run Unit and Integration Tests"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dotnet-version: '8.0.x'
            framework: 'net8.0'
          - dotnet-version: '9.0.x'
            framework: 'net9.0'
          - dotnet-version: '10.0.x'
            framework: 'net10.0'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Unit Tests
        run: dotnet test test/FxMap.Tests/FxMap.Tests.csproj -c Release --framework ${{ matrix.framework }} --filter "FullyQualifiedName~FxMap.Tests.UnitTests" --logger "console;verbosity=normal"

      - name: Run Contract Tests
        run: dotnet test test/FxMap.Tests/FxMap.Tests.csproj -c Release --framework ${{ matrix.framework }} --filter "FullyQualifiedName~FxMap.Tests.ContractTests" --logger "console;verbosity=normal"

      - name: Run Integration Tests (EF Core)
        run: dotnet test test/FxMap.Tests/FxMap.Tests.csproj -c Release --framework ${{ matrix.framework }} --filter "FullyQualifiedName~FxMap.Tests.IntegrationTests.EfCore" --logger "console;verbosity=normal"

      - name: Run Analyzer Tests
        run: dotnet test test/FxMap.Analyzers.Tests/FxMap.Analyzers.Tests.csproj -c Release --framework ${{ matrix.framework }} --logger "console;verbosity=normal"
  
  calc-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    needs:
      - build
      - testing
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.ref }}" = 'refs/heads/main' ]; then
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "version=${VERSION}-develop.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
  
  publish:
    name: Build and Publish NuGets
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && success()
    needs:
      - calc-version
    steps:
      - name: Version Output Check
        run: echo "Publishing version ${{ needs.calc-version.outputs.version }}"

      - name: Check out code
        uses: actions/checkout@v4

      - name: Install .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build All Projects
        run: dotnet build -c Release -p:Version=${{ needs.calc-version.outputs.version }}

      - name: Pack All Projects
        run: |
          dotnet pack --no-build -c Release -p:PackageVersion=${{ needs.calc-version.outputs.version }} -o ./artifacts

      - name: List Packed Files
        run: ls -al ./artifacts

      - name: Publish NuGets
        working-directory: artifacts
        run: |
          for file in *.nupkg; do
            if [[ "$file" =~ ^(FxMap|FxMap\.(Analyzers|EntityFrameworkCore|MongoDb|HotChocolate|Aws\.Sqs|Azure\.ServiceBus|Grpc|Kafka|Nats|RabbitMq))\.[0-9] ]]; then
              echo "Pushing $file"
              dotnet nuget push "$file" -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }} --skip-duplicate --no-symbols
            else
              echo "Skipping $file (not in allowed list)"
            fi
          done