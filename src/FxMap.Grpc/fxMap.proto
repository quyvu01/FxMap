syntax = "proto3";

import "google/protobuf/wrappers.proto";

option csharp_namespace = "FxMap.Grpc";

package FxMapTransport;

service FxMapTransportService {
  rpc GetItems (GetFxMapGrpcQuery) returns (FxMapItemsGrpcResponse);
  rpc GetDistributedKeys (GetDistributedKeysQuery) returns (DistributedKeyTypeResponse);
}

message GetFxMapGrpcQuery {
  repeated string selector_ids = 1;
  google.protobuf.StringValue expression = 2;
  google.protobuf.StringValue distributed_key_assembly_type = 3;
}

message FxMapItemsGrpcResponse {
  repeated ItemGrpc items = 1;
}

message GetDistributedKeysQuery {

}

message DistributedKeyTypeResponse {
  repeated string distributed_key_types = 1;
}

message ItemGrpc {
  string id = 1;
  repeated FxMapValueItemGrpc fxmap_values = 2;
}
message FxMapValueItemGrpc {
  google.protobuf.StringValue expression = 1;
  google.protobuf.StringValue value = 2;
}